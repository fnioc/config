# https://moonrepo.dev/docs/config/project
$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'library'
language: 'typescript'

# @fnconfig/core is a PURE-TYPES package. `build` rolls a single self-contained
# dist/index.d.ts (rollup-plugin-dts) for publication and asserts no runtime .js
# is emitted; `lint` typechecks the source. There is no `test` task -- core ships
# no runtime, so there is no behaviour to exercise.
tasks:
  build:
    command: 'bun build.ts'
    inputs:
      - 'src/**/*'
      - 'build.ts'
      - 'rollup.dts.mjs'
      - 'tsconfig.json'
      - '/tsconfig.base.json'
      - '/scripts/build-package.ts'
    outputs:
      - 'dist'
  lint:
    command: 'bun x tsc --noEmit -p tsconfig.json'
    options:
      cache: false
