# https://moonrepo.dev/docs/config/project
$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'library'
language: 'typescript'

# @fnconfig/config is the faithful-port core engine. It has no workspace deps and
# no real runtime deps, so nothing is externalized at build time and it depends
# on no other project.

tasks:
  build:
    # Typecheck src first, then bundle: `tsc --noEmit` catches type errors
    # before build.ts produces the dist artefacts (bun build does not typecheck).
    script: 'bun x tsc --noEmit -p tsconfig.json && bun build.ts'
    inputs:
      - 'src/**/*'
      - 'build.ts'
      - 'rollup.dts.mjs'
      - 'rollup.with-type-augment.dts.mjs'
      - 'tsconfig.json'
      - '/tsconfig.base.json'
      - '/scripts/build-package.ts'
    outputs:
      - 'dist'
  test:
    command: 'bun test'
    inputs:
      - 'src/**/*'
      - 'test/**/*'
      - 'tsconfig.json'
      - 'package.json'
  lint:
    # Widened tsconfig.lint.json includes test/**/*, so the @ts-expect-error
    # schema fixtures get real compile-time coverage bun test cannot give.
    command: 'bun x tsc --noEmit -p tsconfig.lint.json'
    inputs:
      - 'src/**/*'
      - 'test/**/*'
      - 'tsconfig.json'
      - 'tsconfig.lint.json'
      - '/tsconfig.base.json'
    options:
      cache: false
