# https://moonrepo.dev/docs/config/project
$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'library'
language: 'typescript'

# @fnconfig/env peer-depends on @fnconfig/config and keeps it EXTERNAL at
# build time (both the bun bundle and the rolled-up .d.ts) -- it patches
# ConfigurationBuilder.prototype from @fnconfig/config, so a consumer's copy of
# @fnconfig/config must be the SAME instance the augmentation runs against.
# Bundling a private copy of @fnconfig/config in here
# would create a second, private ConfigurationBuilder whose prototype the
# consumer never touches -- the addEnvironmentVariables sugar would silently
# not exist.
dependsOn:
  - 'config'

tasks:
  build:
    # Typecheck src first, then bundle: `tsc --noEmit` catches type errors
    # before build.ts produces the dist artefacts (bun build does not typecheck).
    script: 'bun x tsc --noEmit -p tsconfig.json && bun build.ts'
    deps:
      - 'config:build'
    inputs:
      - 'src/**/*'
      - 'build.ts'
      - '/scripts/build-package.ts'
      - 'rollup.dts.mjs'
      - 'tsconfig.json'
      - '/tsconfig.base.json'
      - '/packages/config/src/**/*'
    outputs:
      - 'dist'
  test:
    command: 'bun test'
    inputs:
      - 'src/**/*'
      - 'test/**/*'
      - 'tsconfig.json'
      - 'package.json'
  lint:
    # Widened tsconfig.lint.json includes test/**/*, matching packages/config's
    # rationale for lint-time coverage bun test doesn't provide.
    command: 'bun x tsc --noEmit -p tsconfig.lint.json'
    inputs:
      - 'src/**/*'
      - 'test/**/*'
      - 'tsconfig.json'
      - 'tsconfig.lint.json'
      - '/tsconfig.base.json'
    options:
      cache: false
